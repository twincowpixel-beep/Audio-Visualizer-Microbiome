<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isometric Dithered Blob Playground</title>
    <style>
        @font-face {
            font-family: "Saturno";
            src: url("fonts/saturno.ttf") format("truetype");
            font-display: swap;
        }

        :root {
            /* 1980s terminal / early-OS scheme: 1-bit Macintosh-style windows
               (white, hard black borders, striped titlebars, solid offset
               shadows) with green-phosphor CRT accents. */
            --os-white:   #ffffff;
            --os-black:   #111111;
            --os-gray:    #bfbfbf;
            --term-bg:    #0a0f0a;   /* CRT panel */
            --term-green: #33ff66;   /* phosphor */
            --term-dim:   #1d8f44;   /* phosphor on white */

            --eb-fill:     var(--os-white);
            --eb-fill-2:   #f2f2f2;
            --eb-fill-lo:  var(--term-bg);
            --eb-outline:  var(--os-black);
            --eb-frame:    var(--os-black);
            --eb-frame-hi: var(--os-black);
            --eb-frame-lo: var(--os-black);
            --eb-ink:      var(--os-black);
            --eb-muted:    #5a5a5a;
            --green:       var(--term-green);

            /* Solid offset shadow — the early-OS look, not a soft blur. */
            --box-shadow: drop-shadow(5px 5px 0 var(--os-black));

            --font-pixel: "Saturno", "JetBrains Mono", "Menlo", monospace;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #ffffff;
            font-family: var(--font-pixel);
            letter-spacing: 0.08em;
            user-select: none;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
        }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        #canvas-container canvas {
            width: 100vw !important;
            height: 100vh !important;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .pf-content { position: relative; z-index: 1; }
        .pf-label { position: relative; z-index: 1; display: inline-block; pointer-events: none; }

        #ui-overlay {
            position: absolute;
            bottom: 20px; right: 20px;
            z-index: 10;
            display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
        }
        /* Controls live in a drop-up menu; only the ☰ button shows when closed. */
        #menu-panel {
            display: none; flex-direction: column; align-items: flex-end; gap: 10px;
        }
        #menu-panel.open { display: flex; }
        /* Controls readout = a little green-phosphor CRT terminal panel. */
        #controls-help {
            padding: 12px 16px;
            color: var(--term-green);
            text-shadow: 0 0 4px rgba(51,255,102,0.45);
            font: 13px var(--font-pixel);
            letter-spacing: 0.06em;
            max-width: 360px; text-align: right; line-height: 1.5;
            filter: var(--box-shadow);
        }
        #controls-help > * { position: relative; z-index: 1; }
        /* Faint CRT scanlines over the terminal panel. */
        #controls-help::after {
            content: ""; position: absolute; inset: 4px; z-index: 2; pointer-events: none;
            background: repeating-linear-gradient(to bottom, rgba(51,255,102,0.06) 0 1px, transparent 1px 3px);
        }

        .eb-btn {
            position: relative; background: transparent; border: none;
            padding: 12px 20px; color: var(--os-black);
            font: 16px var(--font-pixel); letter-spacing: 0.06em;
            cursor: pointer; overflow: visible;
            filter: drop-shadow(4px 4px 0 var(--os-black));
        }
        .eb-btn > * { position: relative; z-index: 1; }
        .eb-btn:hover { filter: drop-shadow(4px 4px 0 var(--os-black)) invert(0.06); }
        .eb-btn:active { transform: translate(2px, 2px); filter: drop-shadow(2px 2px 0 var(--os-black)); }

        /* ------------ WINDOW CHROME (Windows-style) ----------------- */
        .win {
            position: fixed;
            left: 16px; bottom: 16px;
            width: 380px;
            z-index: 30;
            background: var(--os-white);
            border: 2px solid var(--os-black);
            border-radius: 2px;                       /* early-OS: nearly square */
            box-shadow: 6px 6px 0 var(--os-black);    /* solid offset shadow */
            display: flex; flex-direction: column;
            overflow: hidden;
            min-width: 240px; min-height: 52px;
        }
        /* Classic Macintosh striped titlebar; the title sits on a white plate. */
        .win-bar {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
            background: repeating-linear-gradient(to bottom, var(--os-white) 0 2px, var(--os-black) 2px 3px);
            background-clip: padding-box;
            border-bottom: 2px solid var(--os-black);
            padding: 5px 8px 5px 10px;
            cursor: grab;
        }
        .win.dragging .win-bar { cursor: grabbing; }
        .win-title {
            color: var(--os-black); font: 13px var(--font-pixel); letter-spacing: 0.10em;
            white-space: nowrap; background: var(--os-white); padding: 1px 10px;
        }
        .win-controls { display: flex; gap: 6px; background: var(--os-white); padding: 0 2px; }
        .win-controls button {
            width: 20px; height: 18px; padding: 0;
            border: 2px solid var(--os-black);
            background: var(--os-white);
            color: var(--os-black);
            font: 12px var(--font-pixel); line-height: 1;
            cursor: pointer; border-radius: 0;        /* square, like the Mac close box */
        }
        .win-controls button:hover { background: var(--os-black); color: var(--os-white); }
        .win-body { padding: 12px 14px 14px; overflow: auto; background: var(--os-white); }
        .win .radio-title { display: none; }           /* titlebar already names it */
        .win.min .win-body, .win.min .win-resize { display: none; }
        .win-resize {
            height: 14px; cursor: nwse-resize;
            border-top: 1px solid var(--os-black);
            background: linear-gradient(135deg, transparent 55%, var(--os-black) 55% 63%, transparent 63% 74%, var(--os-black) 74% 82%, transparent 82%);
            background-position: right center; background-repeat: no-repeat; background-size: 22px 14px;
        }

        /* Palette window rows */
        #palette-presets { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
        .pal-preset {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            padding: 6px 9px; cursor: pointer;
            border: 2px solid var(--os-black); background: var(--os-white);
            font: 13px var(--font-pixel); letter-spacing: 0.06em;
        }
        .pal-preset.active { background: var(--os-black); color: var(--os-white); }
        .pal-swatches { display: flex; gap: 3px; }
        .pal-swatches i { width: 13px; height: 13px; border: 1px solid var(--os-black); }
        .pal-preset.active .pal-swatches i { border-color: var(--os-white); }
        .pal-custom-row {
            display: flex; align-items: center; gap: 6px;
            font: 13px var(--font-pixel); letter-spacing: 0.06em;
        }
        .pal-custom-row input[type="color"] {
            width: 30px; height: 26px; padding: 0; border: 2px solid var(--os-black);
            background: var(--os-white); cursor: pointer;
        }
        #pal-custom-use {
            padding: 4px 10px; border: 2px solid var(--os-black); background: var(--os-white);
            font: 13px var(--font-pixel); cursor: pointer;
        }
        #pal-custom-use:hover { background: var(--os-black); color: var(--os-white); }

        /* Minimalist radio UI (boombox click) */
        #radio-panel { left: 20px; top: 20px; right: auto; bottom: auto; width: 264px; }
        .rp-dial {
            height: 44px; margin-bottom: 12px;
            background: var(--term-bg); border: 2px solid var(--os-black);
            display: flex; align-items: center; justify-content: center;
            color: var(--term-green); font: 12px var(--font-pixel); letter-spacing: 0.06em;
            text-shadow: 0 0 4px rgba(51,255,102,0.5);
            box-shadow: inset 0 0 12px rgba(51,255,102,0.12);
            padding: 0 8px; text-align: center; overflow: hidden;
        }
        .rp-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .rp-btn {
            padding: 7px 11px; border: 2px solid var(--os-black); background: var(--os-white);
            color: var(--os-black); font: 14px var(--font-pixel); cursor: pointer; letter-spacing: 0.05em;
        }
        .rp-btn:hover { background: var(--os-black); color: var(--os-white); }
        .rp-tune { flex: 1; }
        .rp-lbl { font: 12px var(--font-pixel); letter-spacing: 0.1em; }
        #rp-vol { flex: 1; min-width: 0; accent-color: #33aa55; }
        .rp-status { color: var(--term-dim); font: 11px var(--font-pixel); text-transform: uppercase; white-space: nowrap; }

        #radio-reopen {
            position: fixed; left: 16px; bottom: 16px; z-index: 30;
            display: none;
            padding: 10px 16px; background: transparent; border: none;
            color: var(--eb-ink); font: 14px var(--font-pixel); cursor: pointer;
            filter: var(--box-shadow);
        }
        #radio-reopen > * { position: relative; z-index: 1; }

        /* ------------ RADIO WIDGET ---------------------------------- */
        .radio { display: flex; flex-direction: column; gap: 10px; }
        .radio .row {
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
            font: 14px var(--font-pixel); color: var(--eb-muted);
        }
        .radio select {
            flex: 1; min-width: 0;
            background: var(--os-white); border: 2px solid var(--os-black);
            color: var(--os-black); padding: 6px 9px; border-radius: 0;
            font: 14px var(--font-pixel); letter-spacing: 0.06em;
        }
        .radio button {
            padding: 6px 13px; border: none; background: transparent;
            color: var(--os-black); cursor: pointer;
            font: 14px var(--font-pixel); letter-spacing: 0.06em; position: relative;
        }
        .radio button > * { position: relative; z-index: 1; }
        .radio button:hover { filter: invert(0.06); }
        /* The oscilloscope is the CRT: green phosphor trace on near-black. */
        .radio .scope {
            display: block; width: 100%; height: 60px;
            background: var(--term-bg); border: 2px solid var(--os-black);
            border-radius: 0; box-shadow: inset 0 0 14px rgba(51,255,102,0.12);
        }
        .radio .status { color: var(--term-dim); text-transform: uppercase; letter-spacing: 0.08em; }
        .radio .info   { color: var(--eb-muted); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-overlay" class="ui-block">
        <div id="menu-panel">
            <button id="spawn-btn" class="eb-btn">Spawn Friend</button>
            <button id="palette-btn" class="eb-btn">Palette</button>
            <button id="bg-btn" class="eb-btn">BG: Sky</button>

            <button id="director-btn" class="eb-btn">Director Mode</button>
        </div>
        <button id="menu-btn" class="eb-btn">☰ Menu</button>
    </div>

    <!-- Palette picker window -->
    <div id="palette-win" class="win ui-block" style="display:none; left:auto; right:16px; bottom:76px; width:280px;">
        <div class="win-bar">
            <span class="win-title">◉ PALETTE</span>

    <!-- Draggable / minimizable / resizable radio window -->
    <div id="radio-win" class="win ui-block">

    <!-- Minimalist radio UI — opens when you click the boombox -->
    <div id="radio-panel" class="win ui-block" style="display:none;">
        <div class="win-bar">
            <span class="win-title">◉ RADIO</span>

        <div class="win-body">
            <div class="rp-dial"><span id="rp-name">— tap TUNE —</span></div>

                <button id="rp-prev" class="rp-btn" title="previous station">◀</button>

    </div>

    <div id="canvas-container"></div>

    <script src="js/pixel-frame.js"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/radio.js"></script>
    <script src="js/audio-reactive.js"></script>

    <script>
        // --- 1. Scene & free-fly perspective camera ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = null; // dithered backdrop drawn in its own pass

        // Mobile gets a lighter setup (lower render res, cheaper shadows, fewer props).
        const IS_MOBILE = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                          (('ontouchstart' in window) && Math.min(window.innerWidth, window.innerHeight) < 820);
        
        // Slightly higher base render resolution for a finer dither scale
        const RENDER_H = IS_MOBILE ? 320 : 420;
        let aspect = window.innerWidth / window.innerHeight;

        const camera = new THREE.PerspectiveCamera(62, aspect, 0.5, 6000);
        const camPos = new THREE.Vector3(0, 30, 86);
        let camYaw = Math.PI;      // face -Z (toward the arena)
        let camPitch = -0.30;      // look slightly down
        let camFov = 62;
        const _lookDir = new THREE.Vector3();
        const _fwd = new THREE.Vector3();
        const _right = new THREE.Vector3();

        function lookVectors() {
            const cp = Math.cos(camPitch), sp = Math.sin(camPitch);
            _lookDir.set(Math.sin(camYaw) * cp, sp, Math.cos(camYaw) * cp);
            _fwd.set(Math.sin(camYaw), 0, Math.cos(camYaw));           // horizontal forward
            _right.set(-Math.cos(camYaw), 0, Math.sin(camYaw));        // horizontal right
        }
        function updateCamera() {
            lookVectors();
            camera.position.copy(camPos);
            camera.lookAt(camPos.x + _lookDir.x, camPos.y + _lookDir.y, camPos.z + _lookDir.z);
        }
        updateCamera();

        // --- Optional ISOMETRIC view (ortho orbit/pan/zoom, ported from 0.6) ---
        let viewMode = 'free';                 // 'free' (perspective) | 'iso' (ortho)
        let isoFrustum = 96;
        const isoCam = new THREE.OrthographicCamera(-isoFrustum * aspect / 2, isoFrustum * aspect / 2, isoFrustum / 2, -isoFrustum / 2, 1, 4000);
        const isoTarget = new THREE.Vector3(0, 6, 0);
        let isoTheta = Math.PI / 4, isoPhi = Math.PI / 3.3;
        const isoRadius = 380;                 // kept < skydome radius so the dome still wraps
        function applyIsoFrustum(){
            isoCam.left = -isoFrustum * aspect / 2; isoCam.right = isoFrustum * aspect / 2;
            isoCam.top = isoFrustum / 2; isoCam.bottom = -isoFrustum / 2; isoCam.updateProjectionMatrix();
        }
        function updateIsoCam(){
            isoCam.position.set(
                isoTarget.x + isoRadius * Math.sin(isoPhi) * Math.sin(isoTheta),
                isoTarget.y + isoRadius * Math.cos(isoPhi),
                isoTarget.z + isoRadius * Math.sin(isoPhi) * Math.cos(isoTheta));
            isoCam.lookAt(isoTarget);
        }
        applyIsoFrustum(); updateIsoCam();
        // The camera actually rendered/raycast: the perspective cam while Director
        // runs (fisheye needs fov) or in Free mode; the ortho cam in Iso mode.
        function curCam(){ return (viewMode === 'iso' && !directorMode) ? isoCam : camera; }
        function setViewMode(m){
            viewMode = m;
            const b = document.getElementById('view-btn'); const lbl = b && b.querySelector('.pf-label');
            if (lbl) lbl.textContent = 'View: ' + (m === 'iso' ? 'Iso' : 'Free');
            if (m === 'iso') { if (pointerLocked) { try { document.exitPointerLock(); } catch (_) {} } applyIsoFrustum(); updateIsoCam(); }
            applyFog();
        }

        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
        renderer.setSize(RENDER_H * aspect, RENDER_H);
        renderer.setPixelRatio(1);
        renderer.autoClear = false;          // manual clear → optional bg pre-pass
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = IS_MOBILE ? THREE.BasicShadowMap : THREE.PCFShadowMap;
        container.appendChild(renderer.domElement);
        const canvasEl = renderer.domElement;

        // --- 2. Dynamic canvas for voxel splotch trails ---
        // RGBA so each creature paints its OWN colour; overlaps blend like paint.
        const arenaSize = 420;
        const trailCanvas = document.createElement('canvas');
        trailCanvas.width = 512; trailCanvas.height = 512;   // 512² → 4× cheaper texture upload
        const trailCtx = trailCanvas.getContext('2d');
        trailCtx.imageSmoothingEnabled = false;
        trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height); // transparent

        const trailTex = new THREE.CanvasTexture(trailCanvas);
        trailTex.magFilter = THREE.NearestFilter;
        trailTex.minFilter = THREE.NearestFilter;
        trailTex.flipY = false;

        let trailDirty = false;   // texture re-upload deferred to once per frame (perf)
        function paintTrail(worldX, worldZ, radius, colorCss) {
            radius = radius || 5;
            const cx = ((worldX + arenaSize / 2) / arenaSize) * trailCanvas.width;
            const cy = ((worldZ + arenaSize / 2) / arenaSize) * trailCanvas.height;
            trailCtx.fillStyle = colorCss || '#ffffff';
            // Splattery: 1-3 offset blobs of VARIED size + alpha → rarely uniform.
            const blobs = 1 + (Math.random() * 3 | 0);
            for (let b = 0; b < blobs; b++) {
                trailCtx.globalAlpha = 0.32 + Math.random() * 0.30;
                const rr = Math.max(1.2, radius * (0.45 + Math.random() * 1.15));
                const ox = (Math.random() - 0.5) * radius * 1.7;
                const oz = (Math.random() - 0.5) * radius * 1.7;
                trailCtx.beginPath();
                trailCtx.arc(cx + ox, cy + oz, rr, 0, 6.2832);
                trailCtx.fill();
            }
            trailCtx.globalAlpha = 1.0;
            trailDirty = true;
        }

        // --- 3. Bayer-dithered LIGHTING engine (real lights + real shadows) ---
        // 8x8 Recursive Bayer Matrix: A 4x4 built inside another 2x2.
        // It provides 64 smooth gradient steps for incredibly organized pixel gradients.
        const BAYER_GLSL = `
        float getDither(vec2 pos){
            float mx=mod(pos.x,4.0), my=mod(pos.y,4.0), d1=0.0;
            if(my==0.0){ if(mx==0.0)d1=0.0; else if(mx==1.0)d1=8.0; else if(mx==2.0)d1=2.0; else d1=10.0; }
            else if(my==1.0){ if(mx==0.0)d1=12.0; else if(mx==1.0)d1=4.0; else if(mx==2.0)d1=14.0; else d1=6.0; }
            else if(my==2.0){ if(mx==0.0)d1=3.0; else if(mx==1.0)d1=11.0; else if(mx==2.0)d1=1.0; else d1=9.0; }
            else { if(mx==0.0)d1=15.0; else if(mx==1.0)d1=7.0; else if(mx==2.0)d1=13.0; else d1=5.0; }
            
            vec2 block = mod(floor(pos / 4.0), 2.0);
            float d2 = 0.0;
            if(block.y==0.0){ if(block.x==0.0)d2=0.0; else d2=2.0; }
            else { if(block.x==0.0)d2=3.0; else d2=1.0; }
            
            return (d1 * 4.0 + d2) / 64.0;
        }`;
        
        // Six dithered steps: a deep "pitch" and a hot highlight are derived so
        // that even the shadows and highlights carry dithered gradient depth.
        const CEL_GLSL = `
        vec3 celBands(float li, float dither, vec3 L, vec3 M, vec3 D){
            vec3 P = D * 0.28;                   // deeper deep-shadow → more range
            vec3 H = mix(L, vec3(1.0), 0.35);    // hot highlight
            if(li<0.17) return P;
            else if(li<0.35) return mix(P,D,step(dither,(li-0.17)/0.18));
            else if(li<0.51) return mix(D,M,step(dither,(li-0.35)/0.16));
            else if(li<0.65) return M;
            else if(li<0.83) return mix(M,L,step(dither,(li-0.65)/0.18));
            return mix(L,H,step(dither,(li-0.83)/0.17));
        }`;

        let _matId = 0;
        // Build a lit, shadow-receiving, dither-cel material. `light/mid/dark`
        // are the object's own 3-tone palette; the real lighting picks the band
        // (with shadows), and the light's colour tints it. `rim` adds a toon
        // silhouette outline (creatures/props on, ground off).
        function makeDitherMaterial(opts) {
            opts = opts || {};
            const L = new THREE.Color(opts.light || '#e8e8e8');
            const M = new THREE.Color(opts.mid || '#8f8f8f');
            const D = new THREE.Color(opts.dark || '#333333');
            const P = D.clone().multiplyScalar(0.5);
            return new THREE.ShaderMaterial({
                uniforms: {
                    ...creatureUniforms,
                    u_colorLight:  { value: L },
                    u_colorMid:    { value: M },
                    u_colorDark:   { value: D },
                    u_colorPitch:  { value: P },
                    u_colorOutline:{ value: opts.outline ? new THREE.Color(opts.outline) : P.clone().multiplyScalar(0.6) },
                    u_rim:         { value: opts.rim ? 1.0 : 0.0 }
                },
                vertexShader: blobVert, fragmentShader: worldFrag
            });
        }

        // --- Flat inked creature shading (imported from AudioBiome0.6) ---------
        const HSV_GLSL = `
        vec3 rgb2hsv(vec3 c){
            vec4 K = vec4(0.0, -1.0/3.0, 2.0/3.0, -1.0);
            vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b, c.g));
            vec4 q = mix(vec4(p.xyw, c.r), vec4(c.r, p.yzx), step(p.x, c.r));
            float d = q.x - min(q.w, q.y); float e = 1.0e-10;
            return vec3(abs(q.z + (q.w - q.y) / (6.0 * d + e)), d / (q.x + e), q.x);
        }
        vec3 hsv2rgb(vec3 c){
            vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
            vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
            return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
        }`;

        // Shared, updated once per frame in animate() → every creature follows
        // the world sun direction + colour.
        const creatureUniforms = {
            u_lightDir:   { value: new THREE.Vector3(0.55, 1.0, 0.35).normalize() },
            u_lightColor: { value: new THREE.Color('#fff4d6') },
            u_pixelSize:  { value: 1.0 }
        };
        const blobVert = `
            varying vec3 vNormal; varying vec3 vWNormal;
            void main(){
                vNormal  = normalize(normalMatrix * normal);        // view space → silhouette
                vWNormal = normalize(mat3(modelMatrix) * normal);   // world space → lighting
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }`;
            
        // Thicker cel-shaded outline version
        // Continuous Bayer-dithered ramp across 5 stops (Pitch→Dark→Mid→Light→Hi).
        // EVERY fragment is a dithered mix of two ADJACENT stops, so shades face
        // into each other smoothly — no flat/abrupt bands, full dynamic range,
        // and the darkest tone is Pitch (a very dark tint of the colour, not black).
        const RAMP_GLSL = `
        vec3 ramp5(float li, float d, vec3 P, vec3 D, vec3 M, vec3 L, vec3 H){
            float t = clamp(li, 0.0, 1.0) * 4.0;
            float seg = floor(t), f = fract(t);
            vec3 a, b;
            if (seg < 1.0)      { a = P; b = D; }
            else if (seg < 2.0) { a = D; b = M; }
            else if (seg < 3.0) { a = M; b = L; }
            else                { a = L; b = H; }
            return mix(a, b, step(d, f));
        }`;
        const blobFrag = `
            uniform vec3 u_lightDir, u_lightColor, u_colorLight, u_colorMid, u_colorDark, u_colorPitch, u_colorOutline;
            uniform float u_pixelSize, u_hover;
            varying vec3 vNormal; varying vec3 vWNormal;
            ${BAYER_GLSL} ${RAMP_GLSL}
            void main(){
                float li = dot(vWNormal, normalize(u_lightDir)) * 0.5 + 0.5;
                // A hovered creature gets a THICK PASTEL-YELLOW outline.
                float thick = 0.40 + (1.0 - li) * 0.16 + u_hover * 0.18;
                float d = getDither(floor(gl_FragCoord.xy / u_pixelSize));
                float jitter = (d - 0.5) * 0.05;
                if (dot(vNormal, vec3(0.0, 0.0, 1.0)) < thick + jitter) {
                    vec3 oc = (u_hover > 0.5) ? mix(u_colorOutline, vec3(1.0, 0.96, 0.60), 0.92) : u_colorOutline;
                    gl_FragColor = vec4(oc, 1.0); return;
                }
                vec3 H = mix(u_colorLight, vec3(1.0), 0.55);                    // bright specular stop
                vec3 c = ramp5(li, d, u_colorPitch, u_colorDark, u_colorMid, u_colorLight, H);
                c *= mix(vec3(1.0), u_lightColor, 0.30);                        // day/night tint
                gl_FragColor = vec4(c, 1.0);
            }`;
        function makeCreatureMat(colLight, colMid, colDark, colPitch, colOutline){
            return new THREE.ShaderMaterial({
                uniforms: {
                    ...creatureUniforms,
                    u_colorLight:   { value: colLight },
                    u_colorMid:     { value: colMid },
                    u_colorDark:    { value: colDark },
                    u_colorPitch:   { value: colPitch },
                    u_colorOutline: { value: colOutline },
                    u_hover:        { value: 0 }
                },
                vertexShader: blobVert, fragmentShader: blobFrag
            });
        }

        // --- Palette system: saturated, THEMED schemes ---------------------------
        // Each palette = a hue set (null = whole wheel) + saturation/lightness
        // ranges. Clicking one instantly recolours every creature (see applyPaletteToAll).
        const PALETTES = {
            'Full Spectrum': { hues: null,                          sat: [0.65, 0.95], lig: [0.50, 0.62] },
            'Sunset':        { hues: [0.02, 0.06, 0.10, 0.95, 0.90], sat: [0.85, 1.00], lig: [0.50, 0.62] },
            'Ocean':         { hues: [0.50, 0.55, 0.60, 0.47, 0.66], sat: [0.70, 0.98], lig: [0.45, 0.60] },
            'Candy':         { hues: [0.90, 0.95, 0.83, 0.55, 0.13], sat: [0.80, 1.00], lig: [0.58, 0.72] },
            'Forest':        { hues: [0.28, 0.33, 0.38, 0.16, 0.44], sat: [0.62, 0.92], lig: [0.40, 0.55] },
            'Vaporwave':     { hues: [0.83, 0.75, 0.50, 0.92, 0.58], sat: [0.75, 1.00], lig: [0.55, 0.70] },
            'Fire':          { hues: [0.00, 0.03, 0.06, 0.09, 0.13], sat: [0.90, 1.00], lig: [0.48, 0.60] },
            'Mint':          { hues: [0.42, 0.45, 0.48, 0.38, 0.52], sat: [0.55, 0.85], lig: [0.52, 0.66] }
        };
        let activePaletteName = 'Full Spectrum';
        let customHues = [0.60, 0.90, 0.15];
        function activePalette(){
            return (activePaletteName === 'Custom')
                ? { hues: customHues, sat: [0.72, 0.96], lig: [0.50, 0.62] }
                : (PALETTES[activePaletteName] || PALETTES['Full Spectrum']);
        }
        function paletteBaseHue(){
            const p = activePalette();
            return (p.hues && p.hues.length) ? p.hues[0] : 0.0;
        }
        function sampleColor(){
            const p = activePalette();
            let hue = p.hues ? (p.hues[Math.floor(Math.random() * p.hues.length)] + (Math.random() - 0.5) * 0.04) : Math.random();
            hue = (hue % 1 + 1) % 1;
            const sat = p.sat[0] + Math.random() * (p.sat[1] - p.sat[0]);
            const lig = p.lig[0] + Math.random() * (p.lig[1] - p.lig[0]);
            return new THREE.Color().setHSL(hue, sat, lig);
        }
        // Recolour one creature in place (updates its shader-uniform ramp).
        function recolorCreature(c, color){
            color = color || sampleColor();
            c.color = color; c.colorCss = '#' + color.getHexString();
            const hsl = { h: 0, s: 0, l: 0 }; color.getHSL(hsl);
            const u = c.body.material.uniforms;
            u.u_colorLight.value.setHSL(hsl.h, Math.max(0.30, hsl.s * 0.75), Math.min(0.92, hsl.l + 0.36));
            u.u_colorMid.value.copy(color);
            u.u_colorDark.value.setHSL(hsl.h, Math.min(1.0, hsl.s * 1.1),  Math.max(0.16, hsl.l * 0.40));
            u.u_colorPitch.value.setHSL(hsl.h, Math.min(1.0, hsl.s * 1.15), Math.max(0.13, hsl.l * 0.22));
            u.u_colorOutline.value.setHSL(hsl.h, Math.min(1.0, hsl.s * 1.2), Math.max(0.07, hsl.l * 0.12));
        }
        // Clicking a palette snaps EVERY existing creature into the new scheme.
        function applyPaletteToAll(){ creatures.forEach(c => recolorCreature(c)); }
        function makeCreatureFromColor(color){
            const hsl = { h: 0, s: 0, l: 0 }; color.getHSL(hsl);
            const colLight = new THREE.Color().setHSL(hsl.h, Math.max(0.30, hsl.s * 0.75), Math.min(0.92, hsl.l + 0.36));
            const colDark  = new THREE.Color().setHSL(hsl.h, Math.min(1.0, hsl.s * 1.1),  Math.max(0.16, hsl.l * 0.40));
            // Pitch + outline are very dark TINTS of the hue — never pure black.
            const colPitch = new THREE.Color().setHSL(hsl.h, Math.min(1.0, hsl.s * 1.15), Math.max(0.13, hsl.l * 0.22));
            const colOut   = new THREE.Color().setHSL(hsl.h, Math.min(1.0, hsl.s * 1.2),  Math.max(0.07, hsl.l * 0.12));
            return makeCreatureMat(colLight, color, colDark, colPitch, colOut);
        }

        // Title-demo dither shading for WORLD surfaces (ground / props / lamp):
        const worldFrag = `
            uniform vec3 u_lightDir, u_lightColor, u_colorLight, u_colorMid, u_colorDark, u_colorPitch, u_colorOutline;
            uniform float u_pixelSize, u_rim;
            varying vec3 vNormal; varying vec3 vWNormal;
            ${BAYER_GLSL} ${RAMP_GLSL}
            void main(){
                float li = dot(vWNormal, normalize(u_lightDir)) * 0.5 + 0.5;
                float d = getDither(floor(gl_FragCoord.xy / u_pixelSize));
                if (u_rim > 0.5 && dot(vNormal, vec3(0.0, 0.0, 1.0)) < 0.30) { gl_FragColor = vec4(u_colorOutline, 1.0); return; }
                vec3 H = mix(u_colorLight, vec3(1.0), 0.45);
                vec3 c = ramp5(li, d, u_colorPitch, u_colorDark, u_colorMid, u_colorLight, H);
                c *= mix(vec3(1.0), u_lightColor, 0.22);
                gl_FragColor = vec4(c, 1.0);
            }`;
        function worldMat(l, m, d, p, rim){
            const pc = new THREE.Color(p);
            return new THREE.ShaderMaterial({
                uniforms: {
                    ...creatureUniforms,
                    u_colorLight:  { value: new THREE.Color(l) },
                    u_colorMid:    { value: new THREE.Color(m) },
                    u_colorDark:   { value: new THREE.Color(d) },
                    u_colorPitch:  { value: pc },
                    u_colorOutline:{ value: pc.clone().multiplyScalar(0.6) },   // dark tint, not black
                    u_rim:         { value: rim ? 1.0 : 0.0 }
                },
                vertexShader: blobVert, fragmentShader: worldFrag
            });
        }

        // --- Fake global light (title-demo style) + day/night tint state -------
        const _lightDir = new THREE.Vector3(0.55, 1.0, 0.35).normalize();
        let nightMode = false;   // driven by the sky background's night variant

        // --- Environment geometry (dither gradients carry the 3D depth) ---
        const groundMat = makeDitherMaterial({ light: '#ffffff', mid: '#b9a6a0', dark: '#5a4c4c', rim: false });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(700, 700), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Colour-splotch trails ride on a thin decal plane above the ground.
        const splotchMat = new THREE.ShaderMaterial({
            transparent: true, depthWrite: false,
            uniforms: { u_trailMap: { value: trailTex }, u_time: { value: 0 }, u_pixelSize: { value: 1.0 } },
            vertexShader: `varying vec2 vUv; varying vec3 vWorldPosition;
                void main(){ vUv = uv; vec4 wp = modelMatrix * vec4(position,1.0); vWorldPosition = wp.xyz; gl_Position = projectionMatrix * viewMatrix * wp; }`,
            fragmentShader: `
                uniform sampler2D u_trailMap; uniform float u_time; uniform float u_pixelSize;
                varying vec2 vUv; varying vec3 vWorldPosition;
                ${BAYER_GLSL} ${HSV_GLSL}
                void main(){
                    // Sample the trail by WORLD position (matches paintTrail's
                    // mapping exactly) so splotches land where creatures actually
                    // are — not mirrored by the plane's UV/rotation.
                    vec2 tUV = vec2((vWorldPosition.x + 210.0) / 420.0, (vWorldPosition.z + 210.0) / 420.0);
                    if (tUV.x < 0.0 || tUV.x > 1.0 || tUV.y < 0.0 || tUV.y > 1.0) discard;
                    vec4 tr = texture2D(u_trailMap, tUV);
                    if (tr.a < 0.02) discard;                       // bare ground shows through
                    float d = getDither(floor(gl_FragCoord.xy / u_pixelSize));
                    float baseHue = rgb2hsv(tr.rgb).x;
                    // DRAMATIC hue shifting: wide animated hue sweep + saturation
                    // drift at constant brightness (no light/dark flicker).
                    float sweepA = sin(u_time * 0.9 + vWorldPosition.x * 0.05 + vWorldPosition.z * 0.04);
                    float sweepB = cos(u_time * 0.6 - vWorldPosition.z * 0.05 + vWorldPosition.x * 0.03);
                    float hueA = baseHue + sweepA * 0.17;
                    float hueB = baseHue + sweepB * 0.17 + 0.09;
                    float satA = clamp(0.72 + 0.28 * sin(u_time * 1.1 + vWorldPosition.x * 0.06), 0.3, 1.0);
                    float satB = clamp(0.72 + 0.28 * cos(u_time * 0.8 + vWorldPosition.z * 0.06), 0.3, 1.0);
                    vec3 shadeA = hsv2rgb(vec3(fract(hueA), satA, 0.86));
                    vec3 shadeB = hsv2rgb(vec3(fract(hueB), satB, 0.86));
                    float flow = 0.5 + 0.5 * sin(vWorldPosition.x * 0.10 + u_time * 1.4) * cos(vWorldPosition.z * 0.10 - u_time * 1.1);
                    vec3 col = mix(shadeA, shadeB, step(d, flow));
                    float cov = clamp(tr.a * (0.6 + 0.8 * flow), 0.0, 1.0);
                    if (step(d, cov) < 0.5) discard;
                    gl_FragColor = vec4(col, 0.92);
                }`
        });
        const trailDecal = new THREE.Mesh(
            new THREE.PlaneGeometry(arenaSize, arenaSize),
            splotchMat
        );
        trailDecal.rotation.x = -Math.PI / 2;
        trailDecal.position.y = 0.06;
        trailDecal.renderOrder = 1;
        scene.add(trailDecal);

        // A lamp post to hang the streetlight on.
        const postMat = makeDitherMaterial({ light: '#5a5a64', mid: '#33333b', dark: '#141418', rim: true });
        const lampHeadMat = makeDitherMaterial({ light: '#fff0c0', mid: '#c99a4a', dark: '#5c4420', rim: true });
        const lampPost = new THREE.Group();
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 17, 8), postMat);
        pole.position.y = 8.5; pole.castShadow = true; lampPost.add(pole);
        const arm = new THREE.Mesh(new THREE.BoxGeometry(4, 0.6, 0.6), postMat);
        arm.position.set(1.6, 16.6, 0); arm.castShadow = true; lampPost.add(arm);
        const lampHead = new THREE.Mesh(new THREE.ConeGeometry(1.8, 2.2, 8), lampHeadMat);
        lampHead.position.set(3.2, 15.6, 0); lampHead.rotation.x = Math.PI; lampHead.castShadow = true; lampPost.add(lampHead);
        const lampGlow = new THREE.Mesh(new THREE.SphereGeometry(0.9, 8, 8), new THREE.MeshBasicMaterial({ color: '#fff0b0' }));
        lampGlow.position.set(3.2, 15.0, 0); lampPost.add(lampGlow);
        lampPost.position.set(-26, 0, -12);
        scene.add(lampPost);

        // Scatter simple 3D props for depth + interesting cast shadows.
        const stoneMat = makeDitherMaterial({ light: '#b6b2a4', mid: '#726e60', dark: '#2b2a24', rim: true });
        const woodMat  = makeDitherMaterial({ light: '#a9784a', mid: '#6e4a28', dark: '#2c1c10', rim: true });
        const leafMat  = makeDitherMaterial({ light: '#7ea653', mid: '#4c6f30', dark: '#1e2e14', rim: true });
        const propMats = [stoneMat, woodMat, stoneMat, leafMat];
        function addProp(x, z, kind, s) {
            let mesh;
            if (kind === 'rock') mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(s), stoneMat);
            else if (kind === 'crate') mesh = new THREE.Mesh(new THREE.BoxGeometry(s * 1.6, s * 1.6, s * 1.6), woodMat);
            else if (kind === 'pillar') mesh = new THREE.Mesh(new THREE.CylinderGeometry(s * 0.7, s * 0.8, s * 4, 8), stoneMat);
            else { // tree = trunk + foliage
                mesh = new THREE.Group();
                const tr = new THREE.Mesh(new THREE.CylinderGeometry(s * 0.4, s * 0.5, s * 4, 6), woodMat);
                tr.position.y = s * 2; tr.castShadow = true; tr.receiveShadow = true;
                const fol = new THREE.Mesh(new THREE.IcosahedronGeometry(s * 2.2, 0), leafMat);
                fol.position.y = s * 5; fol.castShadow = true; fol.receiveShadow = true;
                mesh.add(tr); mesh.add(fol);
            }
            if (mesh.isMesh) { mesh.castShadow = true; mesh.receiveShadow = true; if (kind !== 'crate') mesh.position.y = (kind === 'pillar' ? s * 2 : s); }
            mesh.position.x = x; mesh.position.z = z;
            if (kind === 'crate') mesh.position.y = s * 0.8;
            scene.add(mesh);
        }
        (function scatterProps() {
            const kinds = ['rock', 'crate', 'pillar', 'tree', 'rock', 'tree'];
            for (let i = 0; i < (IS_MOBILE ? 9 : 16); i++) {
                const a = Math.random() * Math.PI * 2;
                const r = 40 + Math.random() * 160;   // spread across the larger arena
                const x = Math.cos(a) * r, z = Math.sin(a) * r;
                if (Math.hypot(x + 26, z + 12) < 8) continue; // keep clear of the lamp
                addProp(x, z, kinds[Math.floor(Math.random() * kinds.length)], 1.6 + Math.random() * 2.4);
            }
        })();

        // Sky dome (follows the camera) — a dithered vertical gradient.
        const skyMat = new THREE.ShaderMaterial({
            side: THREE.BackSide, depthWrite: false, fog: false,
            uniforms: {
                uLo: { value: new THREE.Color('#cfe3f2') }, uHi: { value: new THREE.Color('#6f9fd8') },
                u_time: { value: 0 }, u_night: { value: 0 }
            },
            vertexShader: `varying vec3 vDir; void main(){ vDir = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
            fragmentShader: `
                uniform vec3 uLo, uHi; uniform float u_time, u_night; varying vec3 vDir;
                ${BAYER_GLSL} ${HSV_GLSL}
                float hash21(vec2 p){ p = fract(p * vec2(123.34, 456.21)); p += dot(p, p + 45.32); return fract(p.x * p.y); }
                void main(){
                    vec3 dir = normalize(vDir);
                    float h = clamp(dir.y * 0.6 + 0.35, 0.0, 1.0);
                    vec2 fc = gl_FragCoord.xy;
                    float ripple = sin(fc.x * 0.030 + u_time * 1.1) * 3.0
                                 + sin(fc.y * 0.025 - u_time * 0.8) * 3.0
                                 + sin((fc.x + fc.y) * 0.018 + u_time * 1.6) * 2.0;
                    float d = getDither(floor(fc + vec2(ripple, ripple * 0.7)));
                    vec3 loH = rgb2hsv(uLo), hiH = rgb2hsv(uHi);
                    float hueShift = 0.05 * sin(u_time * 0.35) + 0.03 * sin(u_time * 0.13 + dir.x * 2.0) + 0.06 * sin(u_time * 0.06);
                    float spatial = 0.07 * dir.x + 0.05 * sin(dir.y * 3.0 + u_time * 0.2);
                    vec3 lo = hsv2rgb(vec3(fract(loH.x + hueShift + spatial), loH.y, loH.z));
                    vec3 hi = hsv2rgb(vec3(fract(hiH.x + hueShift + spatial * 0.5), hiH.y, hiH.z));
                    vec3 col = mix(lo, hi, step(d, h));
                    if (u_night > 0.5) {
                        vec2 sc = floor(dir.xy * 260.0 + dir.zz * 80.0);
                        float star = hash21(sc);
                        if (star > 0.984 && dir.y > 0.0) {
                            float tw = 0.55 + 0.45 * sin(u_time * 3.0 + star * 120.0);
                            col = mix(col, vec3(1.0), step(d, tw) * clamp((star - 0.984) / 0.016, 0.0, 1.0));
                        }
                    }
                    gl_FragColor = vec4(col, 1.0);
                }`
        });
        const skyDome = new THREE.Mesh(new THREE.SphereGeometry(600, 24, 16), skyMat);
        skyDome.renderOrder = -1;
        scene.add(skyDome);

        // --- EarthBound BATTLE BACKGROUND (optional) --------------------------
        const bgScene = new THREE.Scene();
        const bgCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const battleMat = new THREE.ShaderMaterial({
            depthTest: false, depthWrite: false,
            uniforms: { u_time: { value: 0 }, u_hue: { value: 0.0 }, u_spectrum: { value: 1.0 } },
            vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }`,
            fragmentShader: `
                uniform float u_time, u_hue, u_spectrum; varying vec2 vUv;
                ${BAYER_GLSL} ${HSV_GLSL}
                void main(){
                    float t = u_time; vec2 uv = vUv;
                    vec2 w1 = uv + 0.06 * vec2(sin(uv.y * 9.0 + t * 1.3), cos(uv.x * 8.0 - t * 1.1));
                    vec2 w2 = uv * 1.7 + 0.09 * vec2(sin(uv.x * 6.0 - t * 0.9), sin(uv.y * 7.0 + t * 1.5));
                    float p1 = sin(w1.x * 20.0 + t * 2.0) * cos(w1.y * 18.0 - t * 1.6);
                    float p2 = sin((w2.x - w2.y) * 16.0 + t * 2.4);
                    float f = clamp((p1 * 0.5 + 0.5) * 0.6 + (p2 * 0.5 + 0.5) * 0.4, 0.0, 1.0);
                    float baseHue = u_hue + u_spectrum * t * 0.03;
                    vec3 cA = hsv2rgb(vec3(fract(baseHue + 0.05 * sin(t * 0.5)), 0.85, 0.55));
                    vec3 cB = hsv2rgb(vec3(fract(baseHue + 0.33), 0.85, 0.78));
                    vec3 cC = hsv2rgb(vec3(fract(baseHue + 0.66), 0.90, 0.40));
                    float dth = getDither(floor(gl_FragCoord.xy / 3.0));
                    vec3 col = mix(cA, cB, step(dth, f));
                    col = mix(col, cC, step(dth, f * f * (0.6 + 0.4 * sin(t * 0.8))));
                    vec2 cell = fract(gl_FragCoord.xy / 4.0) - 0.5;
                    float dotm = smoothstep(0.45, 0.15, length(cell)) * (0.4 + 0.6 * f);
                    col = mix(col * 0.55, col * 1.15, dotm);
                    gl_FragColor = vec4(col, 1.0);
                }`
        });
        bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), battleMat));
        let battleBG = false;
        const BG_MODES = ['sky', 'night', 'battle'];
        let bgModeIdx = 0;
        function setBgMode(mode) {
            battleBG = (mode === 'battle');
            nightMode = (mode === 'night');
            skyDome.visible = (mode !== 'battle');
            skyMat.uniforms.u_night.value = nightMode ? 1.0 : 0.0;
            if (mode === 'night')      setAtmosphere('#0d1226', 90, 640, '#080b18', '#141d3a', '#04060f');
            else if (mode === 'sky')   setAtmosphere('#bcd4e6', 80, 520, '#9fc0dd', '#d7e8f4', '#5f93cf');
            else { applyFog(); applyBg(); }        // battle: fog/bg off
            const b = document.getElementById('bg-btn'); const lbl = b && b.querySelector('.pf-label');
            if (lbl) lbl.textContent = 'BG: ' + (mode === 'sky' ? 'Sky' : mode === 'night' ? 'Night' : 'Battle');
        }
        function cycleBgMode() { bgModeIdx = (bgModeIdx + 1) % BG_MODES.length; setBgMode(BG_MODES[bgModeIdx]); }

        // Sun / moon disc that hangs in the sky.
        const celestial = new THREE.Mesh(new THREE.CircleGeometry(26, 24), new THREE.MeshBasicMaterial({ color: '#fff3c0' }));
        celestial.material.fog = false;
        scene.add(celestial);

        // Candle bodies (little flames), shown in candle mode.
        const candleGroup = new THREE.Group();
        const waxMat = makeDitherMaterial({ light: '#f4ead0', mid: '#c8b48a', dark: '#6a5a3c', rim: true });
        const flameMat = new THREE.MeshBasicMaterial({ color: '#ffcf6a' });
        const candleSpots = [[-14, 0, 14], [16, 0, 10], [4, 0, -16], [-20, 0, -4]];
        candleSpots.forEach((p) => {

            lookVectors();
            let mv = 0;
            if (keys['w']) { camPos.addScaledVector(_fwd, step); mv = 1; }
            if (keys['s']) { camPos.addScaledVector(_fwd, -step); mv = 1; }
            if (keys['d']) { camPos.addScaledVector(_right, step); mv = 1; }
            if (keys['a']) { camPos.addScaledVector(_right, -step); mv = 1; }
            if (keys[' ']) camPos.y += step;
            if (keys['shift']) camPos.y -= step * 0.5;
            camPos.y = Math.max(4, Math.min(220, camPos.y));
            camPos.x = Math.max(-320, Math.min(320, camPos.x));
            camPos.z = Math.max(-320, Math.min(320, camPos.z));
            updateCamera();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            const time = clock.getElapsedTime();
            const now = time; // seconds

            reactive.update(dt);

            // Flat creatures + world surfaces follow the fixed fake light; the
            // tint cools at night (driven by the sky background's night variant).
            creatureUniforms.u_lightDir.value.copy(_lightDir);
            creatureUniforms.u_lightColor.value.setRGB(nightMode ? 0.62 : 1.0, nightMode ? 0.68 : 1.0, nightMode ? 0.98 : 0.98);
            splotchMat.uniforms.u_time.value = time;
            if (trailDirty) { trailTex.needsUpdate = true; trailDirty = false; }   // one upload/frame

            // Sky ripples + hue-shifts over time; celestial disc = sun by day,
            // moon at night; both follow the ACTIVE camera.
            skyMat.uniforms.u_time.value = time;
            const cam = curCam();
            skyDome.position.copy(cam.position);
            celestial.material.color.set(nightMode ? '#e2e8ff' : '#fff3c0');
            celestial.position.copy(cam.position).addScaledVector(_lightDir, 500);
            celestial.lookAt(cam.position);

            // Boombox bounces to the beat + puffs sound rings.
            updateBoombox(dt, time);
            // Blobs periodically gather around the boombox, then disperse.
            gatherTimer -= dt;
            if (gatherTimer <= 0) { gatherActive = !gatherActive; gatherTimer = gatherActive ? (10 + Math.random() * 8) : (16 + Math.random() * 16); }
            if (_npTimer > 0) { _npTimer -= dt; if (_npTimer <= 0) { const el = document.getElementById('now-playing'); if (el) el.classList.remove('show'); } }

            // Pulsing pastel-yellow hover highlight on the creature under the cursor.
            if (hoveredCreature) {
                if (creatures.indexOf(hoveredCreature) === -1) hoveredCreature = null;
                else hoveredCreature.body.material.uniforms.u_hover.value = 0.7 + 0.3 * Math.sin(time * 8.0);
            }
            // Camera: Director › follow-subject › manual.
            if (followSubject && creatures.indexOf(followSubject) === -1) followSubject = null;
            if (directorMode) directorUpdate(time, dt);
            else if (followSubject) followSubject_update(dt);
            else if (viewMode === 'free') flyCamera(dt);
            updateDance(now, dt);
            creatures.forEach(c => updateCreature(c, dt, time));

            // Creature-vs-creature collisions.
            for (let i = 0; i < creatures.length; i++) {
                for (let j = i + 1; j < creatures.length; j++) {
                    const c1 = creatures[i], c2 = creatures[j];
                    if (c1.dancing && c2.dancing) continue;
                    const dist = c1.group.position.distanceTo(c2.group.position);
                    const minDist = c1.radius + c2.radius;
                    // Touching an active dancer recruits the other blob into the dance.
                    if ((c1.dancing || c2.dancing) && dist < minDist + 1.5) { danceTryRecruit(c1, c2, now); continue; }
                    if (dist < minDist) {
                        const dir = new THREE.Vector3().subVectors(c1.group.position, c2.group.position).normalize();
                        const overlap = minDist - dist;
                        c1.group.position.addScaledVector(dir, overlap * 0.5);
                        c2.group.position.addScaledVector(dir, -overlap * 0.5);
                        const relVel = new THREE.Vector3().subVectors(c1.velocity, c2.velocity);
                        const impulse = dir.clone().multiplyScalar(relVel.dot(dir) * 0.8);
                        c1.velocity.sub(impulse); c2.velocity.add(impulse);
                        c1.squishTimer = 0.08; c2.squishTimer = 0.08;
                        c1.blushTimer = 2.5; c2.blushTimer = 2.5;
                    }
                }
            }

            // Voxel splotches — arc, then settle on the ground and linger.
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.position.y > floorY + 0.45) {
                    p.velocity.y += gravity * dt; p.position.addScaledVector(p.velocity, dt);
                    p.rotation.x += dt * 5; p.rotation.y += dt * 5;
                    p._trailT += dt;
                    if (p._trailT > 0.03) { p._trailT = 0; paintTrail(p.position.x, p.position.z, 1, p._trailCss); }
                } else {
                    p.position.y = floorY + 0.4; p.velocity.set(0, 0, 0);
                    p.life -= dt * 0.55;                      // linger as a coloured voxel pile
                    p.scale.setScalar(Math.max(0.2, p.life));
                }
                if (p.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }

            battleMat.uniforms.u_time.value = time;
            battleMat.uniforms.u_hue.value = paletteBaseHue();
            battleMat.uniforms.u_spectrum.value = (activePaletteName === 'Full Spectrum') ? 1.0 : 0.0;
            renderer.clear();
            if (battleBG) renderer.render(bgScene, bgCam);
            renderer.render(scene, cam);
        }

        window.addEventListener('resize', () => {
            aspect = window.innerWidth / window.innerHeight;
            camera.aspect = aspect;
            camera.updateProjectionMatrix();
            applyIsoFrustum();
            renderer.setSize(RENDER_H * aspect, RENDER_H);
        });

        animate();
    </script>

    <script>
        // --- 10. UI chrome, windowed radio, boot ---
        (function bootUI() {
            // Early-OS boxes: white fill inside a thick BLACK rounded pixel
            // border (classic Macintosh button silhouette). No gloss/smudge/
            // canvas shadow — CSS supplies the solid offset shadow.
            const osBox = { fill: '#ffffff', fillHi: '#ffffff', fillLo: '#ffffff',
                            outline: '#111111', frame: '#111111', frameHi: '#111111', frameLo: '#111111',
                            noGloss: true, noSmudge: true, noShadow: true };
            // CRT terminal panel: near-black phosphor screen in the same black frame.
            const termBox = { ...osBox, fill: '#0a0f0a', fillHi: '#0a0f0a', fillLo: '#0a0f0a' };

            // --- Drum-chopper (EarthBound text-box) button styling --------------
            // pixel-frame.js was ported from drum-chopper's app.py; its DEFAULT
            // colours ARE the drum-chopper look (pink bevelled frame + dark purple
            // interior + gloss/smudge/shadow). So: no osBox overrides here — and
            // the frame hue re-tints live to complement the selected palette.
            const styledButtons = [];
            ['menu-btn', 'view-btn', 'palette-btn', 'bg-btn', 'director-btn', 'spawn-btn'].forEach(id => {
                const el = document.getElementById(id);
                styledButtons.push({ el, pb: new PixelButton(el, { r: 10, border: 4 }) });
            });
            {
                const el = document.getElementById('radio-reopen');
                styledButtons.push({ el, pb: new PixelButton(el, { r: 8, border: 3 }) });
            }

            // Each control is its OWN distinct MUTED colour (drum-chopper pill with
            // gloss + drop shadow, but soft/desaturated). The whole set rotates
            // toward the active palette so it still harmonises with the world.
            const BTN_HUE = { 'menu-btn': 0.47, 'spawn-btn': 0.33, 'palette-btn': 0.95,
                              'bg-btn': 0.58, 'view-btn': 0.72, 'director-btn': 0.11,
                              'radio-reopen': 0.47 };
            function mutedStyle(h) {
                const c = (s, l) => '#' + new THREE.Color().setHSL((h % 1 + 1) % 1, s, l).getHexString();
                return {
                    frame:   c(0.30, 0.50),   // muted coloured border (auto-bevels)
                    fill:    c(0.22, 0.80),   // soft desaturated face
                    fillHi:  c(0.18, 0.88),
                    fillLo:  c(0.32, 0.64),
                    outline: c(0.45, 0.16),   // dark rim
                    shine:   '#ffffff',
                    ink:     c(0.55, 0.13)    // dark label
                };
            }
            function applyButtonPalette() {
                const shift = (activePaletteName === 'Full Spectrum') ? 0 : paletteBaseHue() * 0.5;
                styledButtons.forEach(({ el, pb }) => {
                    const s = mutedStyle((BTN_HUE[el.id] ?? 0.5) + shift);
                    pb.restyle({ frame: s.frame, fill: s.fill, fillHi: s.fillHi, fillLo: s.fillLo, outline: s.outline, shine: s.shine });
                    el.style.color = s.ink;
                });
            }
            applyButtonPalette();

            // View toggle: Free (perspective fly) ↔ Iso (orthographic orbit).
            document.getElementById('view-btn').addEventListener('click', () => {
                setViewMode(viewMode === 'iso' ? 'free' : 'iso');
            });
            // Background: Sky (V2 dome) ↔ Battle (EB pattern, pointillism + dither).
            document.getElementById('bg-btn').addEventListener('click', cycleBgMode);
            // ☰ Menu drop-up: reveal/hide the panel of controls.
            const menuPanel = document.getElementById('menu-panel');
            document.getElementById('menu-btn').addEventListener('click', () => menuPanel.classList.toggle('open'));

            // --- Palette window -------------------------------------------------
            const palWin = document.getElementById('palette-win');
            document.getElementById('palette-btn').addEventListener('click', () => {
                palWin.style.display = palWin.style.display === 'none' ? 'flex' : 'none';
            });
            document.getElementById('palette-close').addEventListener('click', () => { palWin.style.display = 'none'; });

            // Preset rows with hue swatches; click to activate.
            const presetsEl = document.getElementById('palette-presets');
            const SWATCH_HUES = { 'Full Spectrum': [0.0, 0.14, 0.3, 0.5, 0.66, 0.83] };
            function paletteSwatches(name) {
                const hues = SWATCH_HUES[name] || (PALETTES[name] && PALETTES[name].hues) || [];
                return hues.map(h => {
                    const c = new THREE.Color().setHSL(h, 0.75, 0.55);
                    return '<i style="background:#' + c.getHexString() + '"></i>';
                }).join('');
            }
            function refreshPresetRows() {
                presetsEl.querySelectorAll('.pal-preset').forEach(row => {
                    row.classList.toggle('active', row.dataset.name === activePaletteName);
                });
            }
            Object.keys(PALETTES).forEach(name => {
                const row = document.createElement('div');
                row.className = 'pal-preset'; row.dataset.name = name;
                row.innerHTML = '<span>' + name + '</span><span class="pal-swatches">' + paletteSwatches(name) + '</span>';
                row.addEventListener('click', () => { activePaletteName = name; refreshPresetRows(); applyButtonPalette(); applyPaletteToAll(); });
                presetsEl.appendChild(row);
            });
            refreshPresetRows();

            // Custom colors → hue set from the three pickers.
            document.getElementById('pal-custom-use').addEventListener('click', () => {
                const hsl = { h: 0, s: 0, l: 0 };
                customHues = [...palWin.querySelectorAll('.pal-custom')].map(inp => {
                    new THREE.Color(inp.value).getHSL(hsl); return hsl.h;
                });
                activePaletteName = 'Custom';
                refreshPresetRows();               // deselects presets
                applyButtonPalette();
                applyPaletteToAll();
            });

            // The radio lives in the world as the draggable 3D boombox; clicking it
            // opens this minimalist knobs/dials UI (built here, driven by Radio).
            window.radio = new Radio(window.audioEngine);
            const oldWin = document.getElementById('radio-win'); if (oldWin) oldWin.remove();
            const oldPill = document.getElementById('radio-reopen'); if (oldPill) oldPill.remove();

            const rpanel = document.getElementById('radio-panel');
            const rpName = document.getElementById('rp-name');
            const rpStatus = document.getElementById('rp-status');
            const rpTune = document.getElementById('rp-tune');
            function stationName() { const r = window.radio, s = r && r.stations[r.stationIdx]; return s ? s.name : '—'; }
            function updateRadioPanel() {
                const r = window.radio, on = !!(r && r.playing);
                rpName.textContent = stationName();
                rpStatus.textContent = on ? 'ON AIR' : 'OFF AIR';
                rpTune.textContent = on ? '■ STOP' : '▶ TUNE';
            }
            // Exposed on window so the canvas click/tap handlers (other script) can call it.
            window.openRadioUI = function () { rpanel.style.display = 'flex'; updateRadioPanel(); };
            const bump = () => { boombox.velocity.y = Math.max(boombox.velocity.y, 18); boombox.squishTimer = 0.12; };
            document.getElementById('rp-close').addEventListener('click', () => { rpanel.style.display = 'none'; });
            document.getElementById('rp-prev').addEventListener('click', () => {
                const r = window.radio; r.stationIdx = (r.stationIdx - 1 + r.stations.length) % r.stations.length;
                if (r.playing) r.tune(); updateRadioPanel(); showNowPlaying(stationName());
            });
            document.getElementById('rp-next').addEventListener('click', () => {
                const r = window.radio; r.stationIdx = (r.stationIdx + 1) % r.stations.length;
                if (r.playing) r.tune(); updateRadioPanel(); showNowPlaying(stationName());
            });
            rpTune.addEventListener('click', () => {
                const r = window.radio; if (r.playing) r.stop(); else r.tune();
                bump(); showNowPlaying(stationName());
                setTimeout(updateRadioPanel, 150); setTimeout(updateRadioPanel, 900);
            });
            document.getElementById('rp-vol').addEventListener('input', (e) => {
                const v = parseFloat(e.target.value);
                if (window.audioEngine && window.audioEngine.master) window.audioEngine.master.gain.value = v;
                if (window.radio && window.radio.audioEl) window.radio.audioEl.volume = v;
            });
        })();
    </script>
