                    tz = danceCenter.z + Math.sin(time * 1.2 + i * 0.7) * 6.0;
                }
                // Per-creature wobble so nobody traces a PERFECT circle/line.
                tx += Math.sin(time * 1.7 + c.pathSeed) * 3.4 + Math.sin(time * 0.6 + c.pathSeed * 2.3) * 2.0;
                tz += Math.cos(time * 1.3 + c.pathSeed * 1.4) * 3.4 + Math.cos(time * 0.5 + c.pathSeed) * 2.0;
                // Eased glide toward target — scaled by joinT (slow drift in, then
                // committed) and this friend's personal speed.
                const k = 1.0 - Math.exp(-dt * (waggling ? 3.2 : 1.7) * c.speedMul * (0.3 + 0.7 * jt));
                c.group.position.x += (tx - c.group.position.x) * k;
                c.group.position.z += (tz - c.group.position.z) * k;
                c.group.position.y = c.radius + bounce;
                c.body.rotation.y += dt * (waggling ? 6.0 : 2.0);
                if (jt > 0.4) paintTrail(c.group.position.x, c.group.position.z, splotchR, c.colorCss, c.footprint, c.heading);
                // Squish against the floor at the bottom of each hop (jello).
                if (bounce < 0.5 && !c._wasDown) { jelloHit(c, 0, 1, 0, 0.26 + 0.1 * c.bounceMul); c._wasDown = true; }
                if (bounce > 1.3) c._wasDown = false;
                applyJello(c, dt);
                orientFace(c, dt);
                updateFaceExpression(c);
                return;
            }

            if (!c.isDragged) {
                // Beat impulse — crazy bounce, harder when louder.
                if (reactive.beat) {
                    const power = 22 + reactive.level * 90;
                    c.velocity.y += power * (0.6 + Math.random() * 0.7);
                    const ang = Math.random() * Math.PI * 2;
                    const h = 12 + reactive.level * 80;
                    c.velocity.x += Math.cos(ang) * h;
                    c.velocity.z += Math.sin(ang) * h;
                    jelloHit(c, 0, 1, 0, 0.24);
                    if (c.velocity.length() > maxVelocity) c.velocity.setLength(maxVelocity);
                    paintTrail(c.group.position.x, c.group.position.z, c.radius, c.colorCss, c.footprint, c.heading);
                    spawnParticles(c.group.position, c.velocity, c.color, c.colorCss);
                }

                if (c.hyperTimer > 0) c.hyperTimer -= dt;
                c.velocity.y += gravity * dt;
                c.group.position.addScaledVector(c.velocity, dt);

                const bounds = (arenaSize / 2) - c.radius;
                if (Math.abs(c.group.position.x) > bounds) { c.group.position.x = Math.sign(c.group.position.x) * bounds; c.velocity.x *= -bounceFactor; jelloHit(c, Math.sign(c.group.position.x), 0, 0, 0.3); }
                if (Math.abs(c.group.position.z) > bounds) { c.group.position.z = Math.sign(c.group.position.z) * bounds; c.velocity.z *= -bounceFactor; jelloHit(c, 0, 0, Math.sign(c.group.position.z), 0.3); }

                // Gentle idle spin (no more rigid tumbling); relax any leftover tilt.
                c.body.rotation.y += dt * 0.6;
                c.body.rotation.x *= (1 - Math.min(1, dt * 4)); c.body.rotation.z *= (1 - Math.min(1, dt * 4));

                if (c.group.position.y <= floorY + c.radius) {
                    c.group.position.y = floorY + c.radius;
                    const impact = Math.min(0.46, 0.1 + Math.abs(c.velocity.y) * 0.012);
                    if (Math.abs(c.velocity.y) > 8.0 || c.velocity.lengthSq() > 20.0) {
                        paintTrail(c.group.position.x, c.group.position.z, c.radius, c.colorCss, c.footprint, c.heading);
                        spawnParticles(c.group.position, c.velocity, c.color, c.colorCss);
                    }
                    jelloHit(c, 0, 1, 0, impact);   // flatten against the floor
                    c.velocity.y *= -bounceFactor;
                    c.velocity.x *= friction; c.velocity.z *= friction;
                    if (Math.abs(c.velocity.y) < 1.0) { c.velocity.y = 0; c.velocity.x *= 0.55; c.velocity.z *= 0.55; }
                    if (c.velocity.lengthSq() < 2.0) {
                        c.idleTimer -= dt * (1.0 + reactive.level * 3.0);
                        if (c.idleTimer <= 0) {
                            // Sometimes a friend catches a case of the zoomies and
                            // hops fast, high and often for a short burst.
                            const hyper = (c.hyperTimer || 0) > 0;
                            if (!hyper && Math.random() < 0.14) c.hyperTimer = 1.4 + Math.random() * 2.4;
                            let angle, speed = ((hyper ? 20 : 10) + Math.random() * 15) * c.speedMul;
                            if (gatherActive && !c.dancing) {
                                // Hop toward the boombox (mill around once close).
                                const dx = boombox.group.position.x - c.group.position.x;
                                const dz = boombox.group.position.z - c.group.position.z;
                                const d = Math.hypot(dx, dz);
                                if (d > 15) angle = Math.atan2(dz, dx) + (Math.random() - 0.5) * 0.7;
                                else { angle = Math.random() * Math.PI * 2; speed = Math.random() * 8 + 4; }
                            } else {
                                angle = Math.random() * Math.PI * 2;
                            }
                            const vy = (hyper ? (34 + Math.random() * 22) : (20 + Math.random() * 15)) * c.bounceMul;
                            c.velocity.set(Math.cos(angle) * speed, vy, Math.sin(angle) * speed);
                            c.idleTimer = hyper ? (0.12 + Math.random() * 0.22) : (Math.random() * 1.5 + 0.5);
                        }
                    }
                }

            } else {
                c.idleTimer = 1.5;
                c.sq = 1; c.sqV = 0;            // relax jello while held
            }
            applyJello(c, dt);                 // spring the soft-body squash + feed shader
            orientFace(c, dt);
            updateFaceExpression(c);
        }

        // --- 9. Animation loop ---
        const clock = new THREE.Clock();
        const reactive = new AudioReactive();
        const _musicColor = new THREE.Color();
        const MOVE_SPEED = 68;

        // EarthBound-style layer swap state.
        let paintPhase = 0;
        let layerPrev = 0, layerCur = 1, layerSwapTime = 0, layerTimer = 5;

        // --- Director Mode: audio-paced cinematic camera cuts ---
        const SHOT_TYPES = ['fisheyeFollow', 'closeFisheyeLock', 'pivotFisheye', 'subjectPOV', 'chaseCam', 'swoop', 'orbit', 'groundDolly', 'craneUp', 'lowSweep', 'subjectLockZoom'];
        let dirShot = null, dirShotStart = 0, dirShotDur = 5, dirCutHeld = 0, dirCut = false;
        const _dirCentroid = new THREE.Vector3();
        const _dirP = new THREE.Vector3(), _dirL = new THREE.Vector3(), _dirTmp = new THREE.Vector3(), _dirTmp2 = new THREE.Vector3();
        const _dirLookSmooth = new THREE.Vector3(0, 4, 0);
        // Handheld-camera state: a slow random-walk drift (springs toward new
        // random targets) + faint tremor — reads like a real operator's imperfect
        // hold, not a magnetic sine wobble.
        const _shk = { px: 0, py: 0, pz: 0, vx: 0, vy: 0, vz: 0, gx: 0, gy: 0, gz: 0, t: 0 };
        const easeIO = (t) => t * t * (3.0 - 2.0 * t);

        function crowdCentroid(out) {
            let x = 0, z = 0, densest = null, best = 1e9;
            for (const c of creatures) { x += c.group.position.x; z += c.group.position.z; }
            const n = creatures.length || 1;
            out.set(x / n, 4, z / n);
            // "densest area" = creature with the most neighbours near it
            let bestCount = -1;
            for (const c of creatures) {
                let cnt = 0;
                for (const o of creatures) if (o !== c && o.group.position.distanceTo(c.group.position) < 22) cnt++;
                if (cnt > bestCount) { bestCount = cnt; densest = c; }
            }
            return densest;
        }

        function dirPickShot(time) {
            const dense = crowdCentroid(_dirCentroid);
            let t; do { t = SHOT_TYPES[Math.floor(Math.random() * SHOT_TYPES.length)]; } while (dirShot && t === dirShot.type && SHOT_TYPES.length > 1);
            // Pacing rides the audio: louder → snappier cuts.
            const energy = reactive.active ? Math.min(1, reactive.level * 2.2 + reactive.beatPulse * 0.3) : 0.25;
            dirShotDur = 8.0 - energy * 4.0;           // ~4s loud … 8s calm (fewer cuts)
            dirShotStart = time;
            dirCut = true;                             // next frame snaps to the new pose (a CUT)
            // Every shot is anchored to a live creature subject (dense cluster or a
            // random friend), so the camera is ALWAYS following someone.
            const subjectShots = ['fisheyeFollow', 'closeFisheyeLock', 'pivotFisheye', 'subjectPOV', 'chaseCam', 'subjectLockZoom'];
            const subj = (subjectShots.includes(t) || !dense)
                ? (creatures[Math.floor(Math.random() * creatures.length)] || dense)
                : dense;
            dirShot = { type: t, subj, a0: Math.random() * Math.PI * 2, center: _dirCentroid.clone() };
            // pivotFisheye parks the camera at a fixed spot near the crowd and only
            // rotates to track its subject — pick that pivot once, at cut time.
            if (t === 'pivotFisheye') {
                const fp = (subj ? subj.group.position : _dirCentroid);
                dirShot.pivot = new THREE.Vector3(
                    fp.x + Math.cos(dirShot.a0) * 14,
                    3.0 + Math.random() * 3.0,
                    fp.z + Math.sin(dirShot.a0) * 14);
            }
        }

        function directorUpdate(time, dt) {
            if (!dirShot || (time - dirShotStart) > dirShotDur) dirPickShot(time);
            // Cut on a strong beat only once the shot has really breathed (fewer,
            // softer cuts).
            if (reactive.beat && reactive.beatPulse > 0.96 && reactive.level > 0.16 && (time - dirShotStart) > 2.4) dirPickShot(time);

            const s = dirShot;
            const p = time - dirShotStart;
            const t01 = Math.min(1, p / dirShotDur);
            // Always keep a LIVE subject — re-pick if the old one despawned.
            let subjAlive = s.subj && creatures.indexOf(s.subj) !== -1;
            if (!subjAlive && creatures.length) { s.subj = creatures[Math.floor(Math.random() * creatures.length)]; subjAlive = true; }
            const focus = subjAlive ? s.subj.group.position : s.center;
            const C = s.center;
            let fov = 58;

            if (s.type === 'fisheyeFollow') {
                const ang = s.a0 + p * 0.7;
                _dirP.set(focus.x + Math.cos(ang) * 6.5, focus.y + 2.5 + Math.sin(p * 1.6) * 1.2, focus.z + Math.sin(ang) * 6.5);
                _dirL.copy(focus).y += 0.8;
                fov = 108;                              // wide → fisheye feel, anchored to the friend
            } else if (s.type === 'closeFisheyeLock') {
                // INTIMATE: hugging the friend, inches away, ultra-wide lens.
                // Slow drift around it so its face distorts across the bulge.
                const ang = s.a0 + p * 0.35;
                _dirP.set(focus.x + Math.cos(ang) * 3.4,
                          focus.y + 1.2 + Math.sin(p * 1.1) * 0.5,
                          focus.z + Math.sin(ang) * 3.4);
                _dirL.copy(focus).y += 0.6;
                fov = 130;                              // extreme fisheye, nose-to-nose
            } else if (s.type === 'pivotFisheye') {
                // STATIC fisheye on a tripod: parked low near the crowd, only
                // panning/rotating in place to keep its subject centred.
                _dirP.copy(s.pivot);
                _dirL.copy(focus).y += 0.8;
                fov = 120;
            } else if (s.type === 'swoop') {
                const dx = Math.cos(s.a0), dz = Math.sin(s.a0);
                _dirP.set(C.x + dx * 72, 46 - easeIO(t01) * 26, C.z + dz * 72).addScaledVector(_dirTmp.set(-dx, 0, -dz), easeIO(t01) * 120);
                _dirL.copy(C);
                fov = 62;
            } else if (s.type === 'orbit') {
                const ang = s.a0 + p * 0.4;
                _dirP.set(C.x + Math.cos(ang) * 46, 20, C.z + Math.sin(ang) * 46);
                _dirL.copy(C);
                fov = 55;
            } else if (s.type === 'groundDolly') {
                const dx = Math.cos(s.a0), dz = Math.sin(s.a0);
                _dirP.set(C.x + dx * 38, 3.2, C.z + dz * 38).addScaledVector(_dirTmp.set(-dz, 0, dx), (t01 - 0.5) * 70);
                _dirL.copy(C); _dirL.y = 4.5;
                fov = 52;
            } else if (s.type === 'craneUp') {
                _dirP.set(C.x + Math.cos(s.a0) * 30, 4 + easeIO(t01) * 58, C.z + Math.sin(s.a0) * 30);
                _dirL.copy(C);
                fov = 60;
            } else if (s.type === 'lowSweep') {
                // Low altitude, sweeping laterally across the crowd while zooming in.
                const dx = Math.cos(s.a0), dz = Math.sin(s.a0);
                _dirP.set(C.x + dx * 30, 5, C.z + dz * 30).addScaledVector(_dirTmp.set(-dz, 0, dx), (t01 - 0.5) * 95);
                _dirL.copy(C); _dirL.y = 5;
                fov = 72 - easeIO(t01) * 30;             // 72 → 42 zoom-in
            } else if (s.type === 'longZoomIn') {
                // Far-off telephoto that slowly zooms in (compressed long shot).
                _dirP.set(C.x + Math.cos(s.a0) * 150, 40, C.z + Math.sin(s.a0) * 150);
                _dirL.copy(C);
                fov = 48 - easeIO(t01) * 28;             // 48 → 20 long zoom-in
            } else if (s.type === 'subjectLockZoom') {
                // Locked on one friend, tracking its movement, zooming in on it.
                _dirP.set(focus.x + Math.cos(s.a0) * 42, focus.y + 15, focus.z + Math.sin(s.a0) * 42);
                _dirL.copy(focus);
                fov = 42 - easeIO(t01) * 20;             // 42 → 22 zoom-in on subject
            } else if (s.type === 'subjectPOV') {
                // FIRST-PERSON: ride ON the friend, looking where it's headed.
                const v = subjAlive ? s.subj.velocity : _dirTmp.set(1, 0, 0);
                let vx = v.x, vz = v.z; const vl = Math.hypot(vx, vz) || 1; vx /= vl; vz /= vl;
                _dirP.set(focus.x - vx * 0.6, focus.y + 1.5, focus.z - vz * 0.6);
                _dirL.set(focus.x + vx * 6.0, focus.y + 1.1, focus.z + vz * 6.0);
                fov = 100;
            } else if (s.type === 'chaseCam') {
                // OVER-THE-SHOULDER chase, just behind the friend.
                const v = subjAlive ? s.subj.velocity : _dirTmp.set(1, 0, 0);
                let vx = v.x, vz = v.z; const vl = Math.hypot(vx, vz) || 1; vx /= vl; vz /= vl;
                _dirP.set(focus.x - vx * 9.0, focus.y + 4.5, focus.z - vz * 9.0);
                _dirL.copy(focus).y += 1.2;
                fov = 74;
            } else { // topPush
                _dirP.set(C.x + 3, 92 - easeIO(t01) * 55, C.z + 3);
                _dirL.copy(C);
                fov = 56;
            }

            // CHANGE SHOTS BY CUTTING: the camera rides its shot's own (smooth)
            // path exactly; a new shot jumps the pose instantly = a hard cut.
            camPos.copy(_dirP);
            _dirLookSmooth.copy(_dirL);
            if (dirCut) { camera.fov = fov; dirCut = false; }
            else camera.fov += (fov - camera.fov) * Math.min(1, dt * 9.0);   // intra-shot zooms only

            // Handheld shake: spring the offset toward drifting random targets +
            // a little tremor. Amplitude rides the audio.
            const amp = 0.22 + reactive.level * 1.0 + reactive.beatPulse * 0.5;
            _shk.t -= dt;
            if (_shk.t <= 0) { _shk.t = 0.20 + Math.random() * 0.5; _shk.gx = (Math.random() - 0.5) * 2; _shk.gy = (Math.random() - 0.5) * 2; _shk.gz = (Math.random() - 0.5) * 2; }
            const sK = 9.0, sD = 3.4;
            _shk.vx += ((_shk.gx - _shk.px) * sK - _shk.vx * sD) * dt; _shk.px += _shk.vx * dt;
            _shk.vy += ((_shk.gy - _shk.py) * sK - _shk.vy * sD) * dt; _shk.py += _shk.vy * dt;
            _shk.vz += ((_shk.gz - _shk.pz) * sK - _shk.vz * sD) * dt; _shk.pz += _shk.vz * dt;
            const trem = Math.sin(time * 36.0) * 0.12 + Math.sin(time * 22.7) * 0.08;
            camera.position.set(
                camPos.x + (_shk.px + trem) * amp,
                camPos.y + _shk.py * amp,
                camPos.z + (_shk.pz - trem * 0.6) * amp);
            camFov = camera.fov; camera.updateProjectionMatrix();
            _dirTmp2.copy(_dirLookSmooth);
            _dirTmp2.x += _shk.py * amp * 0.25; _dirTmp2.y += _shk.px * amp * 0.18;
            camera.lookAt(_dirTmp2);
            // Keep manual state in sync so exiting Director Mode resumes smoothly.
            _dirTmp.subVectors(_dirLookSmooth, camPos).normalize();
            camYaw = Math.atan2(_dirTmp.x, _dirTmp.z);
            camPitch = Math.asin(Math.max(-1, Math.min(1, _dirTmp.y)));
        }

        function setDirectorMode(on) {
            directorMode = on;
            const lbl = document.querySelector('#director-btn .pf-label');
            if (lbl) lbl.textContent = on ? 'Director ● ON' : 'Director Mode';
            if (on) {
                if (pointerLocked) { try { document.exitPointerLock(); } catch (_) {} }
                dirShot = null;                         // fresh shot on next frame
                crowdCentroid(_dirLookSmooth);          // seed the smoothed look target
            } else {
                camera.fov = camFov; camera.updateProjectionMatrix();
            }
        }
        document.getElementById('director-btn').addEventListener('click', () => setDirectorMode(!directorMode));

        // Camera follows the clicked subject: keeps your current angle/distance,
        // just glides to keep the friend framed (iso pans its target instead).
        const _fsOff = new THREE.Vector3(), _fsDir = new THREE.Vector3();
        function followSubject_update(dt) {
            const sp = followSubject.group.position;
            const k = 1 - Math.exp(-dt * 3.0);
            if (viewMode === 'iso') {
                isoTarget.lerp(sp, k); updateIsoCam();
            } else {
                _fsOff.copy(camPos).sub(sp);                       // subject → camera
                const dist = Math.max(26, Math.min(90, _fsOff.length()));
                _fsDir.copy(_fsOff).setLength(dist);
                _fsOff.copy(sp).add(_fsDir);                       // desired camera position
                camPos.lerp(_fsOff, k);
                _fsDir.copy(sp).sub(camPos).normalize();           // aim at subject
                camYaw = Math.atan2(_fsDir.x, _fsDir.z);
                camPitch = Math.max(-1.4, Math.min(1.4, Math.asin(Math.max(-1, Math.min(1, _fsDir.y)))));
                updateCamera();
            }
        }

        function flyCamera(dt) {
            const boost = keys['shift'] ? 2.0 : 1.0;
            const step = MOVE_SPEED * dt * boost;
            lookVectors();
            let mv = 0;
            if (keys['w']) { camPos.addScaledVector(_fwd, step); mv = 1; }
            if (keys['s']) { camPos.addScaledVector(_fwd, -step); mv = 1; }
            if (keys['d']) { camPos.addScaledVector(_right, step); mv = 1; }
            if (keys['a']) { camPos.addScaledVector(_right, -step); mv = 1; }
            if (keys[' ']) camPos.y += step;
            if (keys['shift']) camPos.y -= step * 0.5;
            camPos.y = Math.max(4, Math.min(220, camPos.y));
            camPos.x = Math.max(-320, Math.min(320, camPos.x));
            camPos.z = Math.max(-320, Math.min(320, camPos.z));
            updateCamera();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            const time = clock.getElapsedTime();
            const now = time; // seconds

            reactive.update(dt);

            // Flat creatures + world surfaces follow the fixed fake light; the
            // tint cools at night (driven by the sky background's night variant).
            creatureUniforms.u_lightDir.value.copy(_lightDir);
            creatureUniforms.u_lightColor.value.setRGB(nightMode ? 0.62 : 1.0, nightMode ? 0.68 : 1.0, nightMode ? 0.98 : 0.98);
            creatureUniforms.u_lightColor.value.multiply(weatherLight);   // weather tints the light
            splotchMat.uniforms.u_time.value = time;
            if (trailDirty) { trailTex.needsUpdate = true; trailDirty = false; }   // one upload/frame

            // Sky ripples + hue-shifts over time; celestial disc = sun by day,
            // moon at night; both follow the ACTIVE camera.
            skyMat.uniforms.u_time.value = time;
            const cam = curCam();
            // Van-Gogh clouds drift + swirl; hidden in battle / heavy fog.
            cloudMat.uniforms.u_time.value = time;
            cloudGroup.visible = weatherCloudsOn && !battleBG;
            if (cloudGroup.visible) cloudGroup.children.forEach(cl => { cl.position.x += cl.userData.drift * dt; if (cl.position.x > 190) cl.position.x = -190; });
            updatePrecip(dt, cam.position);
            skyDome.position.copy(cam.position);
            celestial.material.color.set(nightMode ? '#e2e8ff' : '#fff3c0');
            celestial.position.copy(cam.position).addScaledVector(_lightDir, 500);
            celestial.lookAt(cam.position);

            // Boombox bounces to the beat + puffs sound rings.
            updateBoombox(dt, time);
            updateLasso(dt);
            updateFloat(dt, time);                       // radio floating into the dock
            // Dock membrane: animate + decay the punch-through ripple.
            dockSphereMat.uniforms.u_time.value = time;
            dockSphereMat.uniforms.u_pulse.value *= Math.exp(-dt * 3.0);
            if (boombox.docked) {
                boomGroup.position.lerp(_ORIGIN, 1 - Math.exp(-dt * 2.5));   // slowly centre in the sphere
                if (window.radio && window.radio.playing) {                  // pixel music notes puff out
                    _noteT -= dt; if (_noteT <= 0) { _noteT = 0.26 + Math.random() * 0.3; spawnBubbleNote(); }
                }
            }
            // Blobs periodically gather around the boombox, then disperse.
            gatherTimer -= dt;
            if (gatherTimer <= 0) { gatherActive = !gatherActive; gatherTimer = gatherActive ? (10 + Math.random() * 8) : (16 + Math.random() * 16); }
            if (_npTimer > 0) { _npTimer -= dt; if (_npTimer <= 0) { const el = document.getElementById('now-playing'); if (el) el.classList.remove('show'); } }

            // Pulsing pastel-yellow silhouette halo on the creature under the cursor.
            if (hoveredCreature) {
                if (creatures.indexOf(hoveredCreature) === -1) { hoveredCreature = null; }
                else if (hoveredCreature.hoverOutline) {
                    const u = hoveredCreature.hoverOutline.material.uniforms;
                    u.u_ow.value = 0.5 + 0.16 * Math.sin(time * 8.0);      // breathing thickness
                    u.u_pulse.value = 0.85 + 0.15 * Math.sin(time * 8.0);
                }
            }
            // While the radio floats into the dock the whole world FREEZES.
            if (!dockFreeze) {
            // Camera: Director › follow-subject › manual.
            if (followSubject && creatures.indexOf(followSubject) === -1) followSubject = null;
            if (directorMode) directorUpdate(time, dt);
            else if (followSubject) followSubject_update(dt);
            else if (viewMode === 'free') flyCamera(dt);
            updateDance(now, dt);
            creatures.forEach(c => updateCreature(c, dt, time));

            // Creature-vs-creature collisions.
            for (let i = 0; i < creatures.length; i++) {
                for (let j = i + 1; j < creatures.length; j++) {
                    const c1 = creatures[i], c2 = creatures[j];
                    if (c1.dancing && c2.dancing) continue;
                    const dist = c1.group.position.distanceTo(c2.group.position);
                    const minDist = c1.radius + c2.radius;
                    // Touching an active dancer recruits the other blob into the dance.
                    if ((c1.dancing || c2.dancing) && dist < minDist + 1.5) { danceTryRecruit(c1, c2, now); continue; }
                    if (dist < minDist) {
                        const dir = new THREE.Vector3().subVectors(c1.group.position, c2.group.position).normalize();
                        const overlap = minDist - dist;
                        c1.group.position.addScaledVector(dir, overlap * 0.5);
                        c2.group.position.addScaledVector(dir, -overlap * 0.5);
                        const relVel = new THREE.Vector3().subVectors(c1.velocity, c2.velocity);
                        const impulse = dir.clone().multiplyScalar(relVel.dot(dir) * 0.8);
                        c1.velocity.sub(impulse); c2.velocity.add(impulse);
                        // Jello: each squishes on the side that hit the other.
                        const amt = Math.min(0.4, 0.14 + Math.abs(relVel.dot(dir)) * 0.01);
                        jelloHit(c1, dir.x, dir.y, dir.z, amt);
                        jelloHit(c2, -dir.x, -dir.y, -dir.z, amt);
                        c1.blushTimer = 2.5; c2.blushTimer = 2.5;
                    }
                }
            }

            // Voxel splotches — arc, then settle on the ground and linger.
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.position.y > floorY + 0.45) {
                    p.velocity.y += gravity * dt; p.position.addScaledVector(p.velocity, dt);
                    p.rotation.x += dt * 5; p.rotation.y += dt * 5;
                    p._trailT += dt;
                    if (p._trailT > 0.03) { p._trailT = 0; paintTrail(p.position.x, p.position.z, 0.7, p._trailCss); }
                } else {
                    p.position.y = floorY + 0.4; p.velocity.set(0, 0, 0);
                    p.life -= dt * 0.55;                      // linger as a coloured voxel pile
                    p.scale.setScalar(Math.max(0.2, p.life));
                }
                if (p.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }
            } // end !dockFreeze

            battleMat.uniforms.u_time.value = time;
            battleMat.uniforms.u_hue.value = paletteBaseHue();
            battleMat.uniforms.u_spectrum.value = (activePaletteName === 'Full Spectrum') ? 1.0 : 0.0;
            renderer.clear();
            if (battleBG) renderer.render(bgScene, bgCam);
            renderer.render(scene, cam);

            // The dock ORB: always render the low-res membrane sphere into the
            // bubble's screen rect (with the frozen radio inside once docked).
            {
                const rr = bubbleEl.getBoundingClientRect();
                const bw = renderer.domElement.width, bh = renderer.domElement.height;
                const sx = bw / window.innerWidth, sy = bh / window.innerHeight;
                const vx = (rr.left + 4) * sx;
                const vw = (rr.width - 8) * sx;
                const vh = (rr.height - 22) * sy;          // leave room for the hint
                const vy = bh - (rr.top + 4) * sy - vh;    // flip Y (GL origin bottom-left)
                if (vw > 4 && vh > 4) {
                    renderer.setScissorTest(true);
                    renderer.setScissor(vx, vy, vw, vh);
                    renderer.setViewport(vx, vy, vw, vh);
                    renderer.clearDepth();                 // keep the world behind → sphere floats over it
                    dockCam.aspect = vw / vh; dockCam.updateProjectionMatrix();
                    renderer.render(dockScene, dockCam);
                    renderer.setScissorTest(false);
                    renderer.setViewport(0, 0, bw, bh);
                }
            }
        }

        window.addEventListener('resize', () => {
            aspect = window.innerWidth / window.innerHeight;
            camera.aspect = aspect;
            camera.updateProjectionMatrix();
            applyIsoFrustum();
            renderer.setSize(curRenderH * aspect, curRenderH, false);
        });

        animate();
    </script>

    <script>
        // --- 10. UI chrome, windowed radio, boot ---
        (function bootUI() {
            // Early-OS boxes: white fill inside a thick BLACK rounded pixel
            // border (classic Macintosh button silhouette). No gloss/smudge/
            // canvas shadow — CSS supplies the solid offset shadow.
            const osBox = { fill: '#ffffff', fillHi: '#ffffff', fillLo: '#ffffff',
                            outline: '#111111', frame: '#111111', frameHi: '#111111', frameLo: '#111111',
                            noGloss: true, noSmudge: true, noShadow: true };
            // CRT terminal panel: near-black phosphor screen in the same black frame.
            const termBox = { ...osBox, fill: '#0a0f0a', fillHi: '#0a0f0a', fillLo: '#0a0f0a' };

            // --- Drum-chopper (EarthBound text-box) button styling --------------
            // pixel-frame.js was ported from drum-chopper's app.py; its DEFAULT
            // colours ARE the drum-chopper look (pink bevelled frame + dark purple
            // interior + gloss/smudge/shadow). So: no osBox overrides here — and
            // the frame hue re-tints live to complement the selected palette.
            const styledButtons = [];
            ['menu-btn', 'view-btn', 'palette-btn', 'bg-btn', 'weather-btn', 'director-btn', 'clear-btn'].forEach(id => {
                const el = document.getElementById(id);
                styledButtons.push({ el, pb: new PixelButton(el, { r: 10, border: 4 }) });
            });
            {
                const el = document.getElementById('radio-reopen');
                styledButtons.push({ el, pb: new PixelButton(el, { r: 8, border: 3 }) });
            }

            // Each control is its OWN distinct MUTED colour (drum-chopper pill with
            // gloss + drop shadow, but soft/desaturated). The whole set rotates
            // toward the active palette so it still harmonises with the world.
            const BTN_HUE = { 'menu-btn': 0.47, 'spawn-btn': 0.33, 'palette-btn': 0.95,
                              'bg-btn': 0.58, 'weather-btn': 0.52, 'view-btn': 0.72, 'director-btn': 0.11,
                              'clear-btn': 0.02, 'radio-reopen': 0.47 };
            function mutedStyle(h) {
                const c = (s, l) => '#' + new THREE.Color().setHSL((h % 1 + 1) % 1, s, l).getHexString();
                return {
                    frame:   c(0.30, 0.50),   // muted coloured border (auto-bevels)
                    fill:    c(0.22, 0.80),   // soft desaturated face
                    fillHi:  c(0.18, 0.88),
                    fillLo:  c(0.32, 0.64),
                    outline: c(0.45, 0.16),   // dark rim
                    shine:   '#ffffff',
                    ink:     c(0.55, 0.13)    // dark label
                };
            }
            function applyButtonPalette() {
                const shift = (activePaletteName === 'Full Spectrum') ? 0 : paletteBaseHue() * 0.5;
                styledButtons.forEach(({ el, pb }) => {
                    const s = mutedStyle((BTN_HUE[el.id] ?? 0.5) + shift);
                    pb.restyle({ frame: s.frame, fill: s.fill, fillHi: s.fillHi, fillLo: s.fillLo, outline: s.outline, shine: s.shine });
                    el.style.color = s.ink;
                });
            }
            applyButtonPalette();

            // View toggle: Free (perspective fly) ↔ Iso (orthographic orbit).
            document.getElementById('view-btn').addEventListener('click', () => {
                setViewMode(viewMode === 'iso' ? 'free' : 'iso');
            });
            // Background: Sky ↔ Night ↔ Battle.
            document.getElementById('bg-btn').addEventListener('click', cycleBgMode);
            // Weather: Clear → Sunset → Ocean → Snow → Rain → Fog.
            document.getElementById('weather-btn').addEventListener('click', cycleWeather);
            applyWeather();   // sync label + precip/clouds for the default weather
            // ☰ Menu drop-up: reveal/hide the panel of controls.
            const menuPanel = document.getElementById('menu-panel');
            document.getElementById('menu-btn').addEventListener('click', () => menuPanel.classList.toggle('open'));

            // --- Palette window -------------------------------------------------
            const palWin = document.getElementById('palette-win');
            document.getElementById('palette-btn').addEventListener('click', () => {
                palWin.style.display = palWin.style.display === 'none' ? 'flex' : 'none';
            });
            document.getElementById('palette-close').addEventListener('click', () => { palWin.style.display = 'none'; });

            // Preset rows: click a row to activate; click a swatch to EDIT that
            // colour (presets with a hue set are editable; Full Spectrum shows a
            // read-only rainbow).
            const presetsEl = document.getElementById('palette-presets');
            const SWATCH_HUES = { 'Full Spectrum': [0.0, 0.14, 0.3, 0.5, 0.66, 0.83] };
            const hueHex = (h) => '#' + new THREE.Color().setHSL((h % 1 + 1) % 1, 0.8, 0.55).getHexString();
            function buildSwatches(name, container) {
                container.innerHTML = '';
                const editable = !!(PALETTES[name] && PALETTES[name].hues);
                const hues = editable ? PALETTES[name].hues : (SWATCH_HUES[name] || []);
                hues.forEach((h, i) => {
                    if (editable) {
                        const inp = document.createElement('input');
                        inp.type = 'color'; inp.className = 'pal-swatch-edit'; inp.value = hueHex(h);
                        inp.title = 'edit this colour';
                        inp.addEventListener('click', e => e.stopPropagation());
                        inp.addEventListener('input', e => {
                            const hsl = { h: 0, s: 0, l: 0 }; new THREE.Color(e.target.value).getHSL(hsl);
                            PALETTES[name].hues[i] = hsl.h;
                            if (activePaletteName === name) { applyButtonPalette(); applyPaletteToAll(); }
                        });
                        container.appendChild(inp);
                    } else {
                        const sw = document.createElement('i'); sw.style.background = hueHex(h);
                        container.appendChild(sw);
                    }
                });
            }
            function refreshPresetRows() {
                presetsEl.querySelectorAll('.pal-preset').forEach(row => {
                    row.classList.toggle('active', row.dataset.name === activePaletteName);
                });
            }
            Object.keys(PALETTES).forEach(name => {
                const row = document.createElement('div');
                row.className = 'pal-preset'; row.dataset.name = name;
                const label = document.createElement('span'); label.textContent = name;
                const sw = document.createElement('span'); sw.className = 'pal-swatches';
                buildSwatches(name, sw);
                row.appendChild(label); row.appendChild(sw);
                row.addEventListener('click', () => { activePaletteName = name; refreshPresetRows(); applyButtonPalette(); applyPaletteToAll(); });
                presetsEl.appendChild(row);
            });
            refreshPresetRows();

            // Custom palette: "+" adds another picker; "Use" applies them all.
            const customRow = palWin.querySelector('.pal-custom-row');
            const addBtn = document.getElementById('pal-custom-add');
            if (addBtn) addBtn.addEventListener('click', () => {
                const inp = document.createElement('input'); inp.type = 'color'; inp.className = 'pal-custom';
                inp.value = hueHex(Math.random());
                customRow.insertBefore(inp, document.getElementById('pal-custom-use'));
            });
            document.getElementById('pal-custom-use').addEventListener('click', () => {
                const hsl = { h: 0, s: 0, l: 0 };
                customHues = [...palWin.querySelectorAll('.pal-custom')].map(inp => {
                    new THREE.Color(inp.value).getHSL(hsl); return hsl.h;
                });
                activePaletteName = 'Custom';
                refreshPresetRows();               // deselects presets
                applyButtonPalette();
                applyPaletteToAll();
            });

            // The radio lives in the world as the draggable 3D boombox; clicking it
            // opens this minimalist knobs/dials UI (built here, driven by Radio).
            window.radio = new Radio(window.audioEngine);
            const oldWin = document.getElementById('radio-win'); if (oldWin) oldWin.remove();
            const oldPill = document.getElementById('radio-reopen'); if (oldPill) oldPill.remove();

            const rpanel = document.getElementById('radio-panel');
            const rpName = document.getElementById('rp-name');
            const rpStatus = document.getElementById('rp-status');
            const rpTune = document.getElementById('rp-tune');
            function stationName() { const r = window.radio, s = r && r.stations[r.stationIdx]; return s ? s.name : '—'; }
            function updateRadioPanel() {
                const r = window.radio, on = !!(r && r.playing);
                rpName.textContent = stationName();
                rpStatus.textContent = on ? 'ON AIR' : 'OFF AIR';
                rpTune.textContent = on ? '■ STOP' : '▶ TUNE';
            }
            // Exposed on window so the canvas click/tap handlers (other script) can call it.
            window.openRadioUI = function () { rpanel.style.display = 'flex'; updateRadioPanel(); };
            const bump = () => { boombox.velocity.y = Math.max(boombox.velocity.y, 18); boombox.squishTimer = 0.12; };
            document.getElementById('rp-close').addEventListener('click', () => { rpanel.style.display = 'none'; });
            document.getElementById('rp-prev').addEventListener('click', () => {
                const r = window.radio; r.stationIdx = (r.stationIdx - 1 + r.stations.length) % r.stations.length;
                if (r.playing) r.tune(); updateRadioPanel(); showNowPlaying(stationName());
            });
            document.getElementById('rp-next').addEventListener('click', () => {
                const r = window.radio; r.stationIdx = (r.stationIdx + 1) % r.stations.length;
                if (r.playing) r.tune(); updateRadioPanel(); showNowPlaying(stationName());
            });
            rpTune.addEventListener('click', () => {
                const r = window.radio; if (r.playing) r.stop(); else r.tune();
                bump(); showNowPlaying(stationName());
                setTimeout(updateRadioPanel, 150); setTimeout(updateRadioPanel, 900);
            });
            document.getElementById('rp-vol').addEventListener('input', (e) => {
                const v = parseFloat(e.target.value);
                if (window.audioEngine && window.audioEngine.master) window.audioEngine.master.gain.value = v;
                if (window.radio && window.radio.audioEl) window.radio.audioEl.volume = v;
            });
        })();
    </script>

    <script>
        // --- Pixel-art magnet icon + animated bouncing-creature spawn button ---
        (function () {
            // Horseshoe magnet drawn pixel-by-pixel → data URL.
            function magnetDataURL() {
                const S = 16, c = document.createElement('canvas'); c.width = c.height = S;
                const x = c.getContext('2d'); x.imageSmoothingEnabled = false;
                const P = (px, py, col) => { x.fillStyle = col; x.fillRect(px, py, 1, 1); };
                const red = '#d63a2f', silver = '#dce1e8', dark = '#8f241b';
                for (let y = 4; y <= 13; y++) { for (let dx = 0; dx < 3; dx++) { P(3 + dx, y, red); P(10 + dx, y, red); } }
                for (let xx = 3; xx <= 12; xx++) { P(xx, 12, red); P(xx, 13, red); }          // bottom bridge
                for (let dx = 0; dx < 3; dx++) { P(3 + dx, 4, silver); P(3 + dx, 5, silver); P(10 + dx, 4, silver); P(10 + dx, 5, silver); }
                for (let y = 6; y <= 11; y++) { P(3, y, dark); P(12, y, dark); }              // shading
                return c.toDataURL();
            }
            const lb = document.getElementById('lasso-btn');
            if (lb) { lb.textContent = ''; lb.style.backgroundImage = 'url(' + magnetDataURL() + ')'; lb.title = 'magnetise the radio into the bubble / eject'; }

            // Rough hand-drawn blob outline: draw a black blob then a colour blob
            // with a DIFFERENT jitter so the rim thickness varies around it.
            function blobPath(x, cx, cy, rx, ry, jit, seed) {
                x.beginPath();
                const N = 18;
                for (let i = 0; i <= N; i++) {
                    const a = i / N * 6.2832;
                    const j = 1 + Math.sin(a * 3 + seed) * jit + Math.sin(a * 7 + seed * 2.3) * jit * 0.5;
                    const px = cx + Math.cos(a) * rx * j, py = cy + Math.sin(a) * ry * j;
                    i ? x.lineTo(px, py) : x.moveTo(px, py);
                }
                x.closePath();
            }
            function spawnFrameURL(i) {
                const S = 22, c = document.createElement('canvas'); c.width = c.height = S;
                const x = c.getContext('2d'); x.imageSmoothingEnabled = false;
                const sq = [[1.0, 1.0, 15], [0.82, 1.24, 10], [1.0, 1.05, 7], [0.86, 1.16, 11], [1.34, 0.72, 16]][i];
                const cx = 11, cy = sq[2], rx = 5.2 * sq[0], ry = 5.2 * sq[1];
                x.fillStyle = '#141014'; blobPath(x, cx, cy, rx + 1.6, ry + 1.6, 0.085, i * 1.7); x.fill();
                x.fillStyle = '#7fd08a'; blobPath(x, cx, cy, rx, ry, 0.06, i * 1.7 + 2.6); x.fill();
                // face
                x.fillStyle = '#141014';
                const ey = Math.round(cy - ry * 0.15);
                x.fillRect(Math.round(cx - rx * 0.42), ey, 1, 2); x.fillRect(Math.round(cx + rx * 0.42), ey, 1, 2);
                const my = Math.round(cy + ry * 0.32);
                if (i === 4) x.fillRect(cx - 1, my, 3, 1);                                     // squished flat mouth
                else { x.fillRect(cx - 1, my, 1, 1); x.fillRect(cx, my + 1, 1, 1); x.fillRect(cx + 1, my, 1, 1); }  // little smile
                return c.toDataURL();
            }
            const frames = [0, 1, 2, 3, 4].map(spawnFrameURL);
            const sb = document.getElementById('spawn-btn');
            if (sb) {
                let f = 0; sb.style.backgroundImage = 'url(' + frames[0] + ')';
                setInterval(() => { f = (f + 1) % frames.length; sb.style.backgroundImage = 'url(' + frames[f] + ')'; }, 150);
            }
        })();
    </script>
